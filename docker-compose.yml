services:
  stockapi:
    # Default to the image published by CI. Run `docker compose pull` to fetch
    # the latest, or `docker compose build` to build locally from ./Dockerfile.
    image: ghcr.io/copelaje/stockapi:latest
    build: .
    container_name: stockapi
    restart: unless-stopped
    ports:
      - "5000:5000"
